name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    name: Build & Test Backend Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test all services
        run: mvn --batch-mode clean verify

  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          CI: false

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true

  docker-build-check:
    name: Validate Docker Builds
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        service:
          - trade-capture-service
          - oms-service
          - portfolio-service
          - risk-engine
          - affirmation-service
          - compliance-service
          - settlement-engine
          - corporate-actions-service
          - accounting-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: itms/${{ matrix.service }}:ci

  docker-build-check-frontend:
    name: Validate Frontend Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: itms/frontend:ci
