spring:
  application:
    name: affirmation-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/itms_affirmation
    username: ${DB_USER:itms}
    password: ${DB_PASSWORD:itms}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: affirmation-service

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
