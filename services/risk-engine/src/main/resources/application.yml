spring:
  application:
    name: risk-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/itms_risk
    username: ${DB_USER:itms}
    password: ${DB_PASSWORD:itms}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: risk-engine
      auto-offset-reset: earliest

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.itms: DEBUG
