apiVersion: v1
kind: ConfigMap
metadata:
  name: itms-kafka-config
  namespace: itms
data:
  bootstrap-servers: "kafka-headless.kafka.svc.cluster.local:9092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: itms-redis-config
  namespace: itms
data:
  host: "redis-master.itms.svc.cluster.local"
  port: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: itms-db-secret
  namespace: itms
type: Opaque
stringData:
  host: "postgres.itms.svc.cluster.local"
  username: "itms"
  password: "CHANGE_ME_IN_PRODUCTION"
