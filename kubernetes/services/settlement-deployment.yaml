apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-engine
  namespace: itms
  labels:
    app: settlement-engine
    tier: back-office
spec:
  replicas: 2
  selector:
    matchLabels:
      app: settlement-engine
  template:
    metadata:
      labels:
        app: settlement-engine
        tier: back-office
    spec:
      containers:
        - name: settlement-engine
          image: itms/settlement-engine:latest
          ports:
            - containerPort: 8087
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: itms-db-secret
                  key: host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: itms-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itms-db-secret
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: itms-kafka-config
                  key: bootstrap-servers
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: settlement-engine
  namespace: itms
spec:
  selector:
    app: settlement-engine
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP
