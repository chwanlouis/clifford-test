apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: itms
  labels:
    app: risk-engine
    tier: middle-office
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
        tier: middle-office
    spec:
      containers:
        - name: risk-engine
          image: itms/risk-engine:latest
          ports:
            - containerPort: 8084
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: itms-db-secret
                  key: host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: itms-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itms-db-secret
                  key: password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: itms-redis-config
                  key: host
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: itms-kafka-config
                  key: bootstrap-servers
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: risk-engine
  namespace: itms
spec:
  selector:
    app: risk-engine
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
